<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Spinner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #myCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <!-- TODO: fix the slow motion on mobile potentially caused by the high dpr or simply low fps -->

    <canvas id="myCanvas"></canvas>

    <script>
        var phantomLimbConfig = { style: false }
        var GameGlobal = {};
        var canvas = document.getElementById("myCanvas");
        var sharedCanvas = document.createElement('canvas');
        var wx = {
            createCanvas: function () {
                var canvas = document.createElement('canvas');
                return canvas;
            },
            createImage: function () {
                var img = document.createElement("IMG");
                return img;
            },
            getSystemInfoSync: function () {
                return {
                    pixelRatio: window.devicePixelRatio,
                    screenWidth: document.body.clientWidth,
                    screenHeight: document.body.clientHeight,
                    SDKVersion: "0.0.1"
                }
            },
            getOpenDataContext: function () {
                return {
                    postMessage: function () { },
                    canvas: sharedCanvas,
                }
            },
            onTouchStart: function (cb) {
                canvas.addEventListener("touchstart", cb);
            },
            onTouchCancel: function (cb) {
                canvas.addEventListener("touchcancel", cb);
            },
            onTouchMove: function (cb) {
                canvas.addEventListener("touchmove", cb);
            },
            onTouchEnd: function (cb) {
                canvas.addEventListener("touchend", cb);
            },
            offTouchEnd: function (cb) {
                canvas.removeEventListener("touchend", cb);
            },
            setPreferredFramesPerSecond: function () { },
            getMenuButtonBoundingClientRect: function () {
                var paddingTop = 8;
                var paddingRight = 8;
                var width = 80;
                var height = 30;
                var top = paddingTop;
                var bottom = top + height;
                var right = window.innerWidth - paddingRight;
                var left = right - width;
                return { top: top, bottom: bottom, left: left, right: right, width: width, height: height };
            },
            createInnerAudioContext: function () {
                var audio = new Audio();
                return {
                    set src(v) { audio.src = v; },
                    get src() { return audio.src; },
                    set volume(v) { audio.volume = v; },
                    get volume() { return audio.volume; },
                    play: function () { audio.currentTime = 0; audio.play().catch(function () {}); },
                    stop: function () { audio.pause(); audio.currentTime = 0; },
                    pause: function () { audio.pause(); },
                    destroy: function () { audio.src = ""; },
                    onError: function () {},
                };
            },
            showShareMenu: function () { },
            onShareAppMessage: function () { },
            onShow: function () { },
        }
    </script>
    <script src="./phantom-limb.js?v=__PHANTOM_HASH__"></script>
</body>

</html>
