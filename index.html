<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Spinner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #container {
            border: none;
            display: block;
        }
    </style>
</head>

<body>
    <iframe id="container" src="./game.html" scrolling="no"></iframe>

    <script>
        var ASPECT_RATIO = 568 / 320;

        function resize() {
            var container = document.getElementById("container");
            var screenWidth, screenHeight;
            if (window.innerHeight / window.innerWidth > ASPECT_RATIO) {
                screenWidth = window.innerWidth;
                screenHeight = screenWidth * ASPECT_RATIO;
            } else {
                screenHeight = window.innerHeight;
                screenWidth = screenHeight / ASPECT_RATIO;
            }
            container.style.width = screenWidth + "px";
            container.style.height = screenHeight + "px";
        }

        resize();
        window.onresize = resize;
    </script>
</body>

</html>
